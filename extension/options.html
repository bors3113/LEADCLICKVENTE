<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LinkedIn Copilot — Options</title>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      max-width: 520px;
      margin: 40px auto;
      padding: 0 16px;
      color: #1a1a2e;
    }
    h1 { font-size: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 16px 0 4px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
    }
    .hint { font-size: 12px; color: #64748b; margin-top: 4px; }
    .row { display: flex; gap: 8px; margin-top: 20px; }
    button {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #save { background: #2563eb; color: #fff; }
    #test { background: #e2e8f0; color: #1a1a2e; }
    #status { font-size: 13px; margin-top: 12px; min-height: 18px; }
    #status.ok { color: #16a34a; }
    #status.err { color: #dc2626; }
  </style>
</head>
<body>
  <h1>LinkedIn Copilot settings</h1>
  <p class="hint">
    Create an API key in your LeadClickVente dashboard under Settings &rarr; API keys,
    then paste it here. It is stored only in this browser.
  </p>

  <label for="apiKey">API key</label>
  <input id="apiKey" type="password" placeholder="lcv_..." autocomplete="off" />

  <label for="apiBaseUrl">Backend URL</label>
  <input id="apiBaseUrl" type="text" placeholder="http://localhost:3008" />
  <p class="hint">Leave as-is for local development.</p>

  <div class="row">
    <button id="save">Save</button>
    <button id="test">Test connection</button>
  </div>
  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
